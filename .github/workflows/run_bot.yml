name: Twice Daily Maharashtra Tender Scraper

on:
  schedule:
    # 03:30 UTC = 09:00 AM IST | 12:30 UTC = 06:00 PM IST
    - cron: '30 3,12 * * *'
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

jobs:
  scrape_and_report:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Required to push the updated json archive back to the repo

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Required Python Packages
        run: |
          pip install requests beautifulsoup4 python-telegram-bot python-dotenv

      - name: Execute Tender Scraper
        run: python main.py
        env:
          # --- GitHub Action maps your Secrets to the Python Environment Variables ---
          GITHUB_ACTIONS: "true"
          
          # Telegram Mapping
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ID_MSEDCL: ${{ secrets.ID_MSEDCL }}
          ID_MAHATENDERS: ${{ secrets.ID_MAHATENDERS }}

          # WhatsApp Evolution API Mapping
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_INSTANCE: ${{ secrets.EVOLUTION_INSTANCE }}
          WA_GROUP_MSEDCL: ${{ secrets.WA_GROUP_MSEDCL }}
          WA_GROUP_MAHATENDERS: ${{ secrets.WA_GROUP_MAHATENDERS }}

      - name: Commit and Push Changes to Archive
        run: |
          git config --global user.name "TenderBot"
          git config --global user.email "bot@tender.com"
          git add tender_archive.json
          # The "|| exit 0" prevents the action from failing if there are no new tenders to commit
          git commit -m "Update tender archive: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push