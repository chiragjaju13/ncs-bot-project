name: Twice Daily Maharashtra Tender Scraper

on:
  schedule:
    # 03:30 UTC = 09:00 AM IST | 12:30 UTC = 06:00 PM IST
    - cron: '30 3,12 * * *'
  workflow_dispatch:

jobs:
  scrape_and_report:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Required Python Packages
        run: |
          pip install requests beautifulsoup4

      - name: Execute Tender Scraper
        run: python main.py
        env:
          # --- TELEGRAM SECRETS (Active Now) ---
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID_MSEDCL: ${{ secrets.TELEGRAM_CHAT_ID_MSEDCL }}
          TELEGRAM_CHAT_ID_MAHATENDERS: ${{ secrets.TELEGRAM_CHAT_ID_MAHATENDERS }}

          # --- WHATSAPP SECRETS (Placeholders for later) ---
          EVO_URL: ${{ secrets.EVO_URL }}
          EVO_KEY: ${{ secrets.EVO_KEY }}
          WA_INSTANCE: ${{ secrets.WA_INSTANCE }}
          WA_GROUP_MSEDCL: ${{ secrets.WA_GROUP_MSEDCL }}
          WA_GROUP_MAHATENDERS: ${{ secrets.WA_GROUP_MAHATENDERS }}

      - name: Commit and Push Changes to Archive
        run: |
          git config --global user.name "TenderBot"
          git config --global user.email "bot@tender.com"
          git add tender_archive.json
          git commit -m "Update tender archive: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push